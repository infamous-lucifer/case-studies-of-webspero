<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webspero Case Studies</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { border-bottom: 2px solid var(--bg); padding-bottom: 1rem; color: var(--primary); }
        .case-study-list { list-style: none; padding: 0; }
        .case-study-item { margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; transition: transform 0.2s; }
        .case-study-item:hover { transform: translateX(5px); border-color: var(--primary); }
        .case-study-item a { display: block; padding: 1rem; text-decoration: none; color: inherit; font-weight: 600; }
        .footer { margin-top: 2rem; font-size: 0.875rem; color: #64748b; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Webspero Case Studies</h1>
        <p>A collection of our independent project deep-dives.</p>
        <ul id="file-list" class="case-study-list">
            <!-- This will be automatically filled by the script below -->
            <li class="case-study-item">Loading studies...</li>
        </ul>
        <div class="footer">Shared by Webspero Team</div>
    </div>

    <script>
        // REPLACE these two with your GitHub info
        const username = 'infamous-lucifer';
        const repo = 'case-studies-of-webspero';

        async function loadFiles() {
            const response = await fetch(`https://github.com{username}/${repo}/contents/`);
            const data = await response.json();
            const listElement = document.getElementById('file-list');
            listElement.innerHTML = ''; // Clear loading text

            data.forEach(file => {
                // Only show .html files, and skip index.html itself
                if (file.name.endsWith('.html') && file.name !== 'index.html') {
                    const li = document.createElement('li');
                    li.className = 'case-study-item';
                    // Make the link look pretty by removing .html and dashes
                    const displayName = file.name.replace('.html', '').replace(/-/g, ' ');
                    li.innerHTML = `<a href="${file.name}">${displayName}</a>`;
                    listElement.appendChild(li);
                }
            });
        }
        loadFiles();
    </script>
</body>
</html>
