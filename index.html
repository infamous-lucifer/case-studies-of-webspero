<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webspero Case Studies</title>
    <style>
        :root { --primary: #0066ff; --bg: #f4f7fa; --card-bg: #ffffff; --text: #334155; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; color: #1e293b; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; color: #64748b; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 24px; text-decoration: none; color: inherit; 
                border: 1px solid #e2e8f0; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card h3 { margin: 0 0 12px 0; color: #1e293b; font-size: 1.25rem; text-transform: capitalize; }
        .card .tag { font-size: 0.75rem; font-weight: bold; color: var(--primary); background: #eff6ff; padding: 4px 12px; border-radius: 20px; align-self: flex-start; margin-bottom: 15px; }
        .view-btn { color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Webspero Case Studies</h1>
            <p class="subtitle">Independent project deep-dives & results</p>
        </header>

        <div class="grid">
            <!-- CASE STUDIES START -->
            
            <a href="case-study-prosperity.html" class="card">
                <span class="tag">Active</span>
                <h3>Prosperity Case Study</h3>
                <span class="view-btn">View Report →</span>
            </a>

            <a href="Deposit-fix-case-study.html" class="card">
                <span class="tag">Active</span>
                <h3>Deposit Fix Case Study</h3>
                <span class="view-btn">View Report →</span>
            </a>

            <!-- ADD NEW CASE STUDIES ABOVE THIS LINE -->
        </div>
    </div>
</body>
</html>
